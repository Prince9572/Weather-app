<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-400 to-indigo-600 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full text-center">
    <h1 class="text-3xl font-bold mb-6 text-gray-800">🌤 Weather App</h1>
    <input
      type="text"
      id="cityInput"
      placeholder="Enter city name"
      class="border rounded px-4 py-2 w-full mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-500"
    />
    <button
      onclick="getWeather()"
      class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700 transition"
    >
      Get Weather
    </button>

    <div id="weatherResult" class="mt-6 text-left text-gray-700 hidden">
      <h2 id="cityName" class="text-2xl font-semibold mb-2"></h2>
      <p><strong>🌡 Temp:</strong> <span id="temperature"></span>°C</p>
      <p><strong>🌥 Condition:</strong> <span id="description"></span></p>
      <p><strong>💧 Humidity:</strong> <span id="humidity"></span>%</p>
      <p><strong>🌬 Wind:</strong> <span id="windSpeed"></span> km/h</p>
    </div>
  </div>

  <script>
    async function getWeather() {
      const apiKey = "7503c00aa58f2dad78ef40f26f51dfeb"; // Replace with your OpenWeatherMap API key
      const city = document.getElementById("cityInput").value;
      const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`;

      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error("City not found");

        const data = await response.json();
        document.getElementById("cityName").innerText = data.name;
        document.getElementById("temperature").innerText = data.main.temp;
        document.getElementById("description").innerText = data.weather[0].description;
        document.getElementById("humidity").innerText = data.main.humidity;
        document.getElementById("windSpeed").innerText = data.wind.speed;

        document.getElementById("weatherResult").classList.remove("hidden");
      } catch (error) {
        alert("❌ City not found or API error.");
      }
    }
  </script>
</body>
</html>
